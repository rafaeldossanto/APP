spring:
  application:
    name: APP

  datasource:
    url: jdbc:postgresql://localhost:5432/trilha_app
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Dev: Hibernate cria/atualiza tabelas. Producao: trocar para 'validate'
      # e gerar o baseline do schema via Flyway.
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  # Resource server: valida o Bearer da app pela chave publica do Cadastro (JWKS).
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:8080/oauth2/jwks}

server:
  port: 8081

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
