spring:
  application:
    name: APP

  datasource:
    url: jdbc:postgresql://localhost:5432/trilha_app
    username: ${DB_USERNAME:myuser}
    password: ${DB_PASSWORD:secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Dev: Hibernate cria/atualiza tabelas. Producao: trocar para 'validate'
      # e gerar o baseline do schema via Flyway.
      ddl-auto: ${DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dial